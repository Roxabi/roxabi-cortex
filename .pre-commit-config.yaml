repos:
- repo: local
  hooks:
  - id: lint
    name: lint
    entry: uv run ruff check
    language: system
    pass_filenames: false
  - id: typecheck
    name: typecheck
    entry: uv run pyright
    language: system
    pass_filenames: false
  - id: check-file-length
    name: Check file length
    language: script
    entry: tools/check_file_length.sh
    types:
    - python
    pass_filenames: false
  - id: check-folder-size
    name: Check folder size
    language: script
    entry: tools/check_folder_size.sh
    pass_filenames: false
  - id: trufflehog
    name: trufflehog secret scan
    entry: trufflehog git file://. --only-verified --fail
    language: system
    pass_filenames: false
    stages:
    - pre-push
  - id: license
    name: license check
    entry: uv run tools/license_check.py
    language: system
    pass_filenames: false
    stages:
    - pre-push
