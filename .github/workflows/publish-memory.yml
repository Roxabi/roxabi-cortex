name: publish-memory

on:
  push:
    branches: [main]
    paths:
      - "packages/memory/**"
      - ".github/workflows/publish-memory.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cortex
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Build context for contracts/nats (Dockerfile --build-context factory=…)
      - name: Checkout factory (contracts + nats)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Roxabi/roxabi-factory
          ref: staging
          path: roxabi-factory

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: packages/memory
          file: packages/memory/Dockerfile
          build-contexts: |
            factory=roxabi-factory
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/roxabi/cortex-memory:main
            ghcr.io/roxabi/cortex-memory:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=cortex-memory NATS satellite (ADR-087)
